<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnalfaBet - Apostas Brasileirão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AnalfaBet</h1>
        <nav>
            <a href="/">Apostas</a>
            <a href="/classificacao.html">Classificação</a>
            <!-- Links de Login/Logout aparecerão aqui via JS -->
        </nav>
    </header>

    <main>
        <section id="auth-section">
            <div class="auth-container">
                <div class="auth-card" id="login-card">
                    <h2>Login</h2>
                    <form id="login-form">
                        <div id="login-message" class="message-area"></div>
                        <div class="input-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" placeholder="seu@email.com" required>
                        </div>
                        <div class="input-group">
                            <label for="login-password">Senha</label>
                            <input type="password" id="login-password" placeholder="Sua senha" required>
                        </div>
                        <button type="button" id="login-button" class="btn btn-primary">Entrar</button>
                        <div class="form-footer">
                            <a href="#" id="forgot-password-link">Esqueci minha senha</a>
                        </div>
                    </form>
                    <div class="social-login-divider">
                        <span>Ou entre com</span>
                    </div>
                    <div class="social-login-buttons">
                        <button type="button" class="btn btn-social btn-google">Google</button>
                        <button type="button" class="btn btn-social btn-facebook">Facebook</button>
                    </div>
                     <p class="auth-switch">Não tem uma conta? <a href="#" id="show-register-link">Cadastre-se</a></p>
                </div>

                <div class="auth-card" id="register-card" style="display: none;"> <!-- Inicialmente escondido -->
                    <h2>Cadastro</h2>
                    <form id="register-form">
                        <div id="register-message" class="message-area"></div>
                        <div class="input-group">
                            <label for="register-name">Nome</label>
                            <input type="text" id="register-name" placeholder="Seu nome completo" required>
                        </div>
                        <div class="input-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" placeholder="seu@email.com" required>
                        </div>
                        <div class="input-group">
                            <label for="register-password">Senha</label>
                            <input type="password" id="register-password" placeholder="Crie uma senha forte" required>
                        </div>
                        <button type="button" id="register-button" class="btn btn-primary">Cadastrar</button>
                    </form>
                    <div class="social-login-divider">
                        <span>Ou cadastre-se com</span>
                    </div>
                    <div class="social-login-buttons">
                        <button type="button" class="btn btn-social btn-google">Google</button>
                        <button type="button" class="btn btn-social btn-facebook">Facebook</button>
                    </div>
                    <p class="auth-switch">Já tem uma conta? <a href="#" id="show-login-link">Faça login</a></p>
                </div>
            </div>
        </section>

        <section id="apostas-section" style="display:none;">
            <h2>Faça sua Aposta</h2>
            <div id="aposta-message" class="message-area"></div>
            <div id="jogos-lista">
                <!-- Lista de jogos aparecerá aqui -->
                <p>Carregando jogos...</p>
            </div>
        </section>

        <section id="minhas-apostas-section" style="display:none;">
            <h2>Minhas Apostas</h2>
            <div id="minhas-apostas-lista">
                <!-- Minhas apostas aparecerão aqui -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 AnalfaBet</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
